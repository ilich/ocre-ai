name: Backend

on:
  push:
    branches: [main, develop]
    paths:
      - apps/backend/**
  pull_request:
    paths:
      - apps/backend/**
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - run: make install

      - run: make test
