# Locust configuration file
# See https://docs.locust.io/en/stable/configuration.html

# Default host for performance testing
# Override with: locust --host=http://your-host.com
host = http://localhost/api

# Number of users to simulate
#users = 10

# Spawn rate (users per second)
#spawn-rate = 2

# Run time (e.g., 5m, 1h, etc.)
#run-time = 5m

# Web UI settings
#web-host = 0.0.0.0
#web-port = 8089

# Headless mode (no web UI)
#headless = true

# CSV output prefix for statistics
#csv = performance_results

# Enable HTML report generation
#html = performance_report.html

# Log level
#loglevel = INFO
