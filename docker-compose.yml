services:
  mongodb:
    image: mongodb/mongodb-atlas-local
    hostname: mongodb
    ports:
      - 27017:27017
    volumes:
      - ./init:/docker-entrypoint-initdb.d
      - db:/data/db
      - configdb:/data/configdb
      - mongot:/data/mongot

  mailpit:
    image: axllent/mailpit:latest
    profiles: [dev, full]
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

  backend:
    build:
      context: ./apps/backend
    profiles: [full]
    env_file: .env.docker
    depends_on:
      - mongodb

  frontend:
    build:
      context: ./apps/frontend
      args:
        VITE_API_BASE_URL: /api
    profiles: [full]
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  db:
  configdb:
  mongot:
