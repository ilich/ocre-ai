services:
  mongodb:
    image: mongodb/mongodb-atlas-local
    profiles: [dev]
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  mailpit:
    image: axllent/mailpit:latest
    profiles: [dev]
    ports:
      - "1025:1025"
      - "8025:8025"
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: 1
      MP_SMTP_AUTH_ALLOW_INSECURE: 1

volumes:
  mongodb_data:
